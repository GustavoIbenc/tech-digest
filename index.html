<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Tech Digest</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --text: #f5f5f5;
      --muted: #a0a0a0;
      --accent: #00ff88;
      --border: #222;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fafafa;
        --card: #fff;
        --text: #1a1a1a;
        --muted: #666;
        --accent: #00cc6a;
        --border: #eee;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }
    header {
      padding: 20px 0 30px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }
    .digest { display: flex; flex-direction: column; gap: 16px; }
    .category {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .category-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .story {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .story:last-child { border-bottom: none; padding-bottom: 0; }
    .story:first-child { padding-top: 0; }
    .story-title {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .story-title strong {
      color: var(--accent);
      font-weight: 600;
    }
    .story-summary {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .story-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .story-link:hover { text-decoration: underline; }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .error {
      background: #ff444422;
      border: 1px solid #ff444444;
      color: #ff6b6b;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
    }
    .refresh-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--accent);
      color: #000;
      border: none;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0,255,136,0.3);
      display: grid;
      place-items: center;
    }
    .refresh-btn:active { transform: scale(0.95); }
    @media (max-width: 400px) {
      h1 { font-size: 24px; }
      .story-title { font-size: 14px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>📰 Tech Digest</h1>
    <div class="subtitle" id="lastUpdated">Loading...</div>
  </header>

  <main id="digest" class="digest">
    <div class="loading">Fetching latest tech news...</div>
  </main>

  <button class="refresh-btn" onclick="loadDigest()" aria-label="Refresh">⟳</button>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
